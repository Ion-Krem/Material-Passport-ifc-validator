<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IFC Material Passport Validator</title>
<style>
  :root {
    --bg: #111827;
    --bg2: #1f2937;
    --text: #f3f4f6;
    --muted: #9ca3af;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --accent-soft: #0d9488;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, var(--bg) 0%, #0f172a 100%);
    color: var(--text);
  }
  .hero {
    text-align: center;
    max-width: 540px;
    padding: 48px 40px;
  }
  .logo {
    width: 96px; height: 96px;
    margin: 0 auto 24px;
    background: linear-gradient(180deg, #2563eb 0%, #0d9488 100%);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 32px; letter-spacing: 1px;
    box-shadow: 0 18px 60px -8px rgba(37, 99, 235, 0.45);
  }
  h1 { font-size: 26px; margin: 0 0 8px 0; font-weight: 600; }
  .tagline { color: var(--muted); margin: 0 0 36px 0; font-size: 14px; line-height: 1.6; }
  .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  button {
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 22px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: background 0.15s, transform 0.06s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); color: white; }
  button.primary:hover { background: var(--accent-hover); }
  button.secondary { background: var(--bg2); color: var(--text); border: 1px solid #374151; }
  button.secondary:hover { background: #374151; }
  button[disabled] { opacity: 0.5; cursor: wait; }
  .footer {
    position: fixed; bottom: 16px; left: 0; right: 0;
    text-align: center; font-size: 11px; color: #6b7280;
  }
  .status {
    margin-top: 24px;
    font-size: 12px;
    color: var(--muted);
    min-height: 18px;
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="logo">IFC</div>
    <h1>IFC Material Passport Validator</h1>
    <p class="tagline">Validate IFC building models for classification, materials, quantities, and Madaster picklist completeness before upload.</p>
    <div class="actions">
      <button class="primary" id="btn-folder">📁 Select Folder</button>
      <button class="secondary" id="btn-files">📄 Select Files</button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <div class="footer">Reports save as Excel + standalone HTML alongside the dashboard view.</div>
<script>
try {
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => history.pushState(null, '', location.href));
} catch (_) {}
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function disableButtons() {
  document.querySelectorAll('button').forEach(b => b.disabled = true);
}
async function pickFolder() {
  disableButtons();
  setStatus('Opening folder picker…');
  try { await window.pywebview.api.pick_folder(); }
  catch (e) { setStatus('Error: ' + e); }
}
async function pickFiles() {
  disableButtons();
  setStatus('Opening file picker…');
  try { await window.pywebview.api.pick_files(); }
  catch (e) { setStatus('Error: ' + e); }
}
document.getElementById('btn-folder').addEventListener('click', pickFolder);
document.getElementById('btn-files').addEventListener('click', pickFiles);
</script>
</body>
</html>
